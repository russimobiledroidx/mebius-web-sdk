name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Abstraction guard
        run: pnpm check:abstraction

  publish:
    # Publishes to npm via changesets. Runs on main; the publish step is skipped
    # unless the NPM_TOKEN secret is configured, so CI stays green until then.
    # To enable publishing: add repo secret NPM_TOKEN (an npm automation token
    # with publish rights to the @mebius scope).
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Publish to npm (changesets)
        if: ${{ env.NPM_TOKEN != '' }}
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish skipped (no NPM_TOKEN secret)
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN secret is not set — skipping npm publish. Add it in repo Settings → Secrets to enable."
